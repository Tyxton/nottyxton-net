<div class="resources-hub">
  <div class="hub-grid">
    <div
      class="hub-window"
      data-module="system_resume"
      onclick="window.loadModule('system_resume')"
    >
      <div class="window-header">┌──── [ ARCHIVE ] ────┐</div>
      <div class="window-content">
        <pre>
█▀▀░█░█
█░░░▀▄▀
▀▀▀░░▀░
        </pre>
        <span class="window-label">[ OPEN RESUME ]</span>
      </div>
      <div class="window-footer">└─────────────────────┘</div>
    </div>

    <div
      class="hub-window"
      data-module="system_comms"
      onclick="window.loadModule('system_comms')"
    >
      <div class="window-header">┌──── [ COMMS ] ─────┐</div>
      <div class="window-content">
        <pre>
▄█▀▀▀█▄
█ ▀▄▀ █
█▄▄▄▄▄█
        </pre>
        <span class="window-label">[ CONTACT FORM ]</span>
      </div>
      <div class="window-footer">└────────────────────┘</div>
    </div>

    <div
      class="hub-window"
      data-module="system_source"
      onclick="window.loadModule('system_source')"
    >
      <div class="window-header">┌──── [ SOURCE ] ────┐</div>
      <div class="window-content">
        <pre>
█▀▀░█░█
█░█░█▀█
▀▀▀░▀░▀
        </pre>
        <span class="window-label">[ REPOSITORIES ]</span>
      </div>
      <div class="window-footer">└────────────────────┘</div>
    </div>
  </div>

  <div class="description-pane">
    <div class="window-content">
      <p id="resource-desc">SELECT A MODULE TO PROCEED.</p>
    </div>
  </div>
</div>
